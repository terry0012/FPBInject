<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <!-- Connection Section -->
  <div class="sidebar-section" data-section-id="connection">
    <details id="details-connection" open>
      <summary class="sidebar-header">
        <i class="codicon codicon-chevron-right"></i>
        <span data-i18n="sidebar.connection">CONNECTION</span>
      </summary>
      <div class="sidebar-content">
        <div class="flex-col">
          <div class="config-item">
            <label data-i18n="connection.port">Port</label>
            <div class="config-item-control flex-row">
              <select
                id="portSelect"
                class="vscode-select"
                title="Serial Port"
                data-i18n="[title]connection.port"
              ></select>
              <button
                class="vscode-btn icon-only secondary"
                onclick="refreshPorts()"
                title="Refresh Ports"
                data-i18n="[title]buttons.refresh"
              >
                <i class="codicon codicon-refresh"></i>
              </button>
            </div>
          </div>
          <div class="config-item">
            <label data-i18n="connection.baudrate">Baudrate</label>
            <div class="config-item-control flex-row">
              <select id="baudrate" class="vscode-select" onchange="onBaudrateSelectChange()">
                <option value="9600">9600</option>
                <option value="19200">19200</option>
                <option value="38400">38400</option>
                <option value="57600">57600</option>
                <option value="115200" selected>115200</option>
                <option value="230400">230400</option>
                <option value="460800">460800</option>
                <option value="921600">921600</option>
                <option value="1000000">1000000</option>
                <option value="1500000">1500000</option>
                <option value="2000000">2000000</option>
                <option value="custom" data-i18n="connection.baudrate_custom">Custom</option>
              </select>
            </div>
          </div>
          <details id="serialDetailsToggle" class="serial-details-toggle">
            <summary class="serial-details-summary">
              <i class="codicon codicon-chevron-right"></i>
              <span data-i18n="connection.advanced_settings">Advanced Settings</span>
            </summary>
            <div class="serial-details-content">
              <div class="config-item" id="customBaudrateItem" style="display: none">
                <label data-i18n="connection.baudrate_custom">Custom Baudrate</label>
                <input
                  type="number"
                  id="customBaudrate"
                  class="vscode-input"
                  value="115200"
                  min="1"
                  placeholder="Baudrate"
                  data-i18n="[placeholder]connection.baudrate"
                />
              </div>
              <div class="config-item">
                <label data-i18n="connection.data_bits">Data Bits</label>
                <select id="dataBits" class="vscode-select">
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8" selected>8</option>
                </select>
              </div>
              <div class="config-item">
                <label data-i18n="connection.parity">Parity</label>
                <select id="parity" class="vscode-select">
                  <option value="none" data-i18n="connection.parity_none">None</option>
                  <option value="even" data-i18n="connection.parity_even">Even</option>
                  <option value="odd" data-i18n="connection.parity_odd">Odd</option>
                  <option value="mark" data-i18n="connection.parity_mark">Mark</option>
                  <option value="space" data-i18n="connection.parity_space">Space</option>
                </select>
              </div>
              <div class="config-item">
                <label data-i18n="connection.stop_bits">Stop Bits</label>
                <select id="stopBits" class="vscode-select">
                  <option value="1" selected>1</option>
                  <option value="1.5">1.5</option>
                  <option value="2">2</option>
                </select>
              </div>
              <div class="config-item">
                <label data-i18n="connection.flow_control">Flow Control</label>
                <select id="flowControl" class="vscode-select">
                  <option value="none" data-i18n="connection.flow_none">None</option>
                  <option value="rtscts">RTS/CTS</option>
                  <option value="dsrdtr">DSR/DTR</option>
                  <option value="xonxoff">XON/XOFF</option>
                </select>
              </div>
            </div>
          </details>
          <button id="connectBtn" class="vscode-btn" onclick="toggleConnect()" data-i18n="connection.connect">
            Connect
          </button>
        </div>
      </div>
      <div class="sidebar-section-resize-handle"></div>
    </details>
  </div>

  <!-- Device Info Section -->
  {% include 'partials/sidebar_device.html' %}

  <!-- Quick Commands Section -->
  {% include 'partials/sidebar_quick_commands.html' %}

  <!-- File Transfer Section -->
  {% include 'partials/sidebar_transfer.html' %}

  <!-- Symbols Section -->
  <div class="sidebar-section" data-section-id="symbols">
    <details id="details-symbols">
      <summary
        class="sidebar-header"
        title="Single-click: view disassembly; Double-click: create patch"
        data-i18n="[title]tooltips.symbols_hint"
      >
        <i class="codicon codicon-chevron-right"></i>
        <span data-i18n="tabs.symbols">SYMBOLS</span>
      </summary>
      <div class="sidebar-content" style="display: flex; flex-direction: column; padding: 0">
        <div style="padding: 4px 8px; border-bottom: 1px solid var(--vscode-panel-border)">
          <input
            type="text"
            id="symbolSearch"
            class="vscode-input"
            placeholder="Search by name or address"
            data-i18n="[placeholder]panels.search_placeholder"
            oninput="searchSymbols()"
            style="height: 22px; font-size: 11px"
          />
        </div>
        <div id="symbolList" class="symbol-list">
          <div style="padding: 8px; font-size: 11px; opacity: 0.7" data-i18n="panels.no_symbols">No symbols loaded</div>
        </div>
      </div>
      <div class="sidebar-section-resize-handle"></div>
    </details>
  </div>

  <!-- Watch Expression Section -->
  <div class="sidebar-section" data-section-id="watch">
    <details id="details-watch">
      <summary class="sidebar-header">
        <i class="codicon codicon-chevron-right"></i>
        <span data-i18n="watch.title">WATCH</span>
      </summary>
      <div class="sidebar-content" style="display: flex; flex-direction: column; padding: 0">
        <div class="watch-input-bar">
          <input
            type="text"
            id="watchExprInput"
            class="vscode-input"
            placeholder="Add expression..."
            data-i18n="[placeholder]watch.add_placeholder"
            onkeydown="if (event.key === 'Enter') watchAddFromInput();"
            style="height: 22px; font-size: 11px; flex: 1"
          />
          <button
            class="vscode-btn icon-only secondary"
            onclick="watchAddFromInput()"
            title="Add"
            data-i18n="[title]watch.add_tooltip"
            style="height: 22px; width: 22px; min-width: 22px; padding: 0"
          >
            <i class="codicon codicon-add"></i>
          </button>
        </div>
        <div id="watchPanel" class="watch-panel">
          <div class="watch-empty" data-i18n="watch.no_watches">No watch expressions</div>
        </div>
        <div class="watch-toolbar">
          <button class="vscode-btn secondary" onclick="watchRefreshAll()" style="font-size: 11px">
            <i class="codicon codicon-refresh"></i>
            <span data-i18n="watch.refresh_all">Refresh All</span>
          </button>
          <button class="vscode-btn secondary" onclick="watchClearAll()" style="font-size: 11px">
            <i class="codicon codicon-clear-all"></i>
            <span data-i18n="watch.clear_all">Clear All</span>
          </button>
        </div>
      </div>
      <div class="sidebar-section-resize-handle"></div>
    </details>
  </div>

  <!-- Configuration Section -->
  {% include 'partials/sidebar_config.html' %}
</div>
